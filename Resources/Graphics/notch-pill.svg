<svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pill Background -->
  <rect x="10" y="10" width="200" height="36" rx="18" fill="black"/>
  
  <!-- Animated EQ Bars (Cyan/Teal) -->
  <g transform="translate(24, 22)">
    <rect x="0" y="6" width="3" height="8" fill="#00E5FF">
      <animate attributeName="height" values="8;4;10;8" dur="0.8s" repeatCount="indefinite" />
      <animate attributeName="y" values="6;10;4;6" dur="0.8s" repeatCount="indefinite" />
    </rect>
    <rect x="5" y="2" width="3" height="12" fill="#00E5FF">
      <animate attributeName="height" values="12;6;14;12" dur="1s" repeatCount="indefinite" />
      <animate attributeName="y" values="2;8;0;2" dur="1s" repeatCount="indefinite" />
    </rect>
    <rect x="10" y="8" width="3" height="6" fill="#00E5FF">
      <animate attributeName="height" values="6;10;4;6" dur="0.6s" repeatCount="indefinite" />
      <animate attributeName="y" values="8;4;10;8" dur="0.6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Text: Daft Punk - One More Time -->
  <text x="110" y="32" fill="white" font-family="SF Pro, -apple-system, BlinkMacSystemFont, sans-serif" font-size="11" text-anchor="middle" letter-spacing="-0.1">Daft Punk - One More Ti...</text>

  <!-- Play Indicator Dot -->
  <circle cx="194" cy="28" r="2.5" fill="white" fill-opacity="0.8"/>
</svg>
