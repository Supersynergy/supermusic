<svg width="360" height="420" viewBox="0 0 360 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <linearGradient id="artworkGradient" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glassBlur" x="0" y="0" width="360" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="BackgroundImageFix" stdDeviation="10"/>
      <feComposite in2="SourceAlpha" operator="in" result="effect1_backgroundBlur"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_backgroundBlur" result="shape"/>
    </filter>
  </defs>

  <!-- Popover Background (Frosted Glass) -->
  <rect x="20" y="20" width="320" height="380" rx="20" fill="#0D1117" fill-opacity="0.9" stroke="white" stroke-opacity="0.1" filter="url(#glassBlur)"/>

  <!-- Top Section: Artwork & Metadata -->
  <rect x="40" y="45" width="60" height="60" rx="10" fill="url(#artworkGradient)"/>
  <text x="112" y="68" fill="white" font-family="sans-serif" font-size="16" font-weight="600">Moonlight Sonata</text>
  <text x="112" y="88" fill="white" fill-opacity="0.6" font-family="sans-serif" font-size="14">Ludwig van Beethoven</text>

  <!-- Scrubber -->
  <rect x="40" y="135" width="280" height="4" rx="2" fill="white" fill-opacity="0.1"/>
  <rect x="40" y="135" width="110" height="4" rx="2" fill="#06B6D4"/>
  <circle cx="150" cy="137" r="5" fill="#06B6D4"/>
  
  <text x="40" y="158" fill="white" fill-opacity="0.5" font-family="monospace" font-size="11">1:42</text>
  <text x="290" y="158" fill="white" fill-opacity="0.5" font-family="monospace" font-size="11" text-anchor="end">-3:14</text>

  <!-- Primary Transport Row -->
  <g transform="translate(40, 185)">
    <!-- Back 5s -->
    <text x="0" y="25" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">⏮5</text>
    
    <!-- Previous -->
    <path d="M55 15V35L40 25L55 15Z" fill="white"/>
    <rect x="37" y="15" width="3" height="20" fill="white"/>

    <!-- Play/Pause Accent -->
    <circle cx="140" cy="25" r="30" fill="#06B6D4"/>
    <rect x="132" y="15" width="6" height="20" rx="1" fill="#0D1117"/>
    <rect x="142" y="15" width="6" height="20" rx="1" fill="#0D1117"/>

    <!-- Next -->
    <path d="M225 15V35L240 25L225 15Z" fill="white"/>
    <rect x="240" y="15" width="3" height="20" fill="white"/>

    <!-- Forward 5s -->
    <text x="255" y="25" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">5⏭</text>
  </g>

  <!-- Secondary Row -->
  <g transform="translate(40, 260)" fill="white" fill-opacity="0.6" font-family="sans-serif" font-size="11">
    <text x="0" y="10" font-weight="bold">⏮10</text>
    
    <!-- Shuffle -->
    <path d="M70 2L85 18M70 18L85 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Repeat -->
    <rect x="135" y="0" width="15" height="15" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
    
    <!-- Mute -->
    <path d="M210 2V13L203 8H200V7H203L210 2Z" fill="currentColor"/>
    
    <text x="260" y="10" font-weight="bold">+10</text>
  </g>

  <!-- Volume Slider Row -->
  <g transform="translate(40, 310)">
    <!-- Speaker Icons -->
    <path d="M0 10V20L5 15H8V10H5L0 10Z" fill="white" fill-opacity="0.5"/>
    <rect x="25" y="13" width="230" height="4" rx="2" fill="white" fill-opacity="0.1"/>
    <rect x="25" y="13" width="180" height="4" rx="2" fill="white" fill-opacity="0.8"/>
    <circle cx="205" cy="15" r="6" fill="white"/>
    <path d="M275 15C275 11 278 8 280 8M275 15C275 19 278 22 280 22" stroke="white" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
